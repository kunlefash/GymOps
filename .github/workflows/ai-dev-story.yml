name: AI Dev Story
on:
  workflow_dispatch:
    inputs:
      story_key:
        description: 'Story key to develop (e.g., 1-1-user-auth)'
        required: true
        type: string

jobs:
  develop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Setup Claude CLI
        run: npm install -g @anthropic-ai/claude-code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Run Dev Agent
        run: |
          STORY_KEY="${{ inputs.story_key }}"
          BRANCH="feat/${STORY_KEY}"
          git config user.name "GymOps AI Agent"
          git config user.email "ai@gymops.dev"
          git checkout -b "$BRANCH"
          claude --yes --skill bmad-bmm-dev-story -- "$STORY_KEY"
          git add -A
          git commit -m "feat(${STORY_KEY}): implement story via AI dev agent

          Co-Authored-By: GymOps AI Agent <ai@gymops.dev>" || echo "No changes to commit"
          git push -u origin "$BRANCH"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Create PR
        run: |
          STORY_KEY="${{ inputs.story_key }}"
          gh pr create \
            --title "feat(${STORY_KEY}): AI implementation" \
            --body "$(cat <<'EOF'
## 🤖 AI-Generated Implementation

**Story**: ${STORY_KEY}
**Agent**: Dev (Amelia)

### Changes
See story file: `_bmad-output/implementation-artifacts/stories/${STORY_KEY}.md`

### Checklist
- [ ] All tests passing
- [ ] Code review requested
- [ ] Test coverage ≥ 80%

---
🤖 Generated by BMAD AI Dev Agent
EOF
)" \
            --label "ai-generated,needs-review" || echo "PR already exists"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
