name: AI Dev Story
on:
  workflow_dispatch:
    inputs:
      story_key:
        description: 'Story key to develop (e.g., 1-1-user-auth)'
        required: true
        type: string
      mode:
        description: 'Execution mode'
        required: true
        default: 'yolo'
        type: choice
        options:
          - yolo
          - interactive

jobs:
  develop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          
      - name: Run Dev Agent
        run: |
          claude -p "Execute the BMAD dev-story workflow for story key: ${{ inputs.story_key }}. Mode: ${{ inputs.mode }}. Follow all steps in _bmad/bmm/workflows/4-implementation/dev-story/steps/ sequentially. Read config from _bmad/bmm/config.yaml." --allowedTools "Edit,Write,Bash,Read,Glob,Grep"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BMAD_MODE: ${{ inputs.mode }}
          
      - name: Create Feature Branch & PR
        run: |
          STORY_KEY="${{ inputs.story_key }}"
          BRANCH="feat/${STORY_KEY}"
          
          git config user.name "GymOps AI Dev"
          git config user.email "ai-dev@gymops.dev"
          
          # Check if there are changes
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi
          
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "feat(${STORY_KEY}): implement story via AI dev agent

          Co-Authored-By: AI Dev Agent (Amelia) <ai-dev@gymops.dev>"
          git push -u origin "$BRANCH"
          
          gh pr create \
            --title "feat(${STORY_KEY}): AI implementation" \
            --body "$(cat <<EOF
## Summary
AI-generated implementation for story \`${STORY_KEY}\`.

**Agent**: Dev (Amelia)
**Mode**: ${{ inputs.mode }}

## Story Reference
See: \`_bmad-output/implementation-artifacts/stories/${STORY_KEY}.md\`

## Checklist
- [ ] All acceptance criteria met
- [ ] Tests passing with ≥80% coverage
- [ ] Code review requested

---
Generated by BMAD AI Dev Agent
EOF
)" \
            --label "ai-generated,needs-review"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
