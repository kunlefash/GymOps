name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'ai-generated')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Setup Claude CLI
        run: npm install -g @anthropic-ai/claude-code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Run Code Review
        run: |
          claude --yes --skill bmad-bmm-code-review -- \
            --pr "${{ github.event.pull_request.number }}"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Post Review
        run: |
          REVIEW_FILE=$(find _bmad-output -name "*review*" -newer .git/HEAD 2>/dev/null | head -1)
          if [ -f "$REVIEW_FILE" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "$(cat $REVIEW_FILE)"
          fi
          gh pr edit ${{ github.event.pull_request.number }} --add-label "reviewed" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
