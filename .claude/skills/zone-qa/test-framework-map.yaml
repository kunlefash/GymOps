# GymOps Test Framework Map
# Maps source paths to test frameworks and conventions

e2e_test_dir: tests/e2e

frameworks:
  jest:
    config: jest.config.ts
    run: "npm test"
    coverage: "npm test -- --coverage"
    patterns:
      - "**/*.test.ts"
      - "**/*.test.tsx"
      - "**/*.spec.ts"

  playwright:
    config: playwright.config.ts
    run: "npx playwright test"
    patterns:
      - "tests/e2e/**/*.spec.ts"

  react-testing-library:
    patterns:
      - "**/*.test.tsx"
    conventions: "React component test patterns (render, screen, userEvent)"

module_test_mapping:
  - pattern: "src/app|src/components|src/hooks"
    framework: jest
    type: unit
    conventions: "React Testing Library for components, Jest for hooks/utils"

  - pattern: "src/lib|src/services|src/stores"
    framework: jest
    type: unit
    conventions: "Pure function testing, mock external deps"

  - pattern: "src/app/api"
    framework: jest
    type: integration
    conventions: "API route handler tests with mocked Prisma"

  - pattern: "prisma"
    framework: jest
    type: integration
    conventions: "Prisma model tests with test database"

  - pattern: "tests/e2e"
    framework: playwright
    type: e2e
    conventions: "Page Object Model, Playwright test patterns"

coverage:
  minimum: 80
  report_format: ["text", "lcov", "json-summary"]
  exclude:
    - "node_modules"
    - ".next"
    - "coverage"
    - "tests/e2e"
