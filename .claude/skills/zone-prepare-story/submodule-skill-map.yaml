# GymOps monorepo skill map
# Maps source directories to domain skills

modules:
  src/app:
    skill: zone-frontend
    description: "Next.js App Router pages and layouts"
  src/components:
    skill: zone-frontend
    description: "React UI components"
  src/lib:
    skill: zone-frontend
    description: "Shared utilities and helpers"
  src/hooks:
    skill: zone-frontend
    description: "Custom React hooks"
  src/services:
    skill: zone-frontend
    description: "API client services"
  src/stores:
    skill: zone-frontend
    description: "State management"
  src/types:
    skill: zone-frontend
    description: "TypeScript type definitions"
  prisma:
    skill: zone-architecture
    description: "Database schema and migrations"
  tests:
    skill: zone-qa
    description: "Test files"
  tests/e2e:
    skill: zone-qa-automation
    description: "E2E Playwright tests"

default:
  skill: zone-frontend
