# planning-artifacts + GitHub Issues publish defaults for zone-bug-fix skill
planning-artifacts:
  space_key: "PMT"
  parent_page_id: "395313155"
  title_template: "{project_name} - Bug Fix"

github-issues:
  atlassian_server: "Atlassian"
  project_key: "CLSDLC"
  project_key_derivation: false
  bug_issue_type: "Bug"
  upsert_strategy: "title-match"
  require_acceptance_criteria: true
  embed_references_inline: true
  mapping_strategy: "separate-sidecar"
  mapping_file: "{implementation_artifacts}/story-key-map.yaml"
  persist_urls: true
